<style>
  :root {
    --bg: #0b090a;
    --bg-card: rgba(22, 19, 21, 0.6);
    --bg-soft: #161315;
    --ink: #f5f3f4;
    --ink-soft: #b1a7a6;
    --ink-faint: #666062;
    --line: rgba(255, 255, 255, 0.08);
    --orange: #ff4d00;
    --orange-deep: #ff7b00;
    --orange-soft: rgba(255, 77, 0, 0.15);
    --amber: #ffb703;
    --amber-soft: rgba(255, 183, 3, 0.15);
    --plum: #9d4edd;
    --plum-soft: rgba(157, 78, 221, 0.15);
    --sunset: linear-gradient(135deg, var(--orange) 0%, var(--amber) 50%, var(--plum) 100%);
    --radius: 12px;
    --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  
  @media (prefers-reduced-motion: reduce) { 
    html { scroll-behavior: auto; } 
    * { animation-duration: .01ms !important; transition-duration: .01ms !important; } 
  }

  body {
    margin: 0;
    background: var(--bg);
    background-image: 
      radial-gradient(at 0% 0%, rgba(255, 77, 0, 0.05) 0px, transparent 50%),
      radial-gradient(at 100% 100%, rgba(157, 78, 221, 0.08) 0px, transparent 50%);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    line-height: 1.7;
    -webkit-font-smoothing: antialiased;
  }

  a { color: inherit; text-decoration: none; transition: color 0.2s; }
  .mono { font-family: 'IBM Plex Mono', monospace; }
  ::selection { background: var(--orange-soft); color: #fff; }

  /* ---------- TOP NAV ---------- */
  .topnav {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 70px;
    background: rgba(11, 9, 10, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 300;
    gap: 8px;
  }
  .topnav::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -1px;
    height: 2px;
    background: var(--sunset);
  }
  .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; background: none; border: none; padding: 0; flex-shrink: 0; }
  .brand-sun { width: 44px; height: 44px; flex-shrink: 0; border-radius: 50%; object-fit: cover; display: block; border: 2px solid var(--orange); box-shadow: 0 0 14px rgba(226,88,12,0.55), 0 0 2px rgba(226,88,12,0.8); }
  .brand-name { font-family: 'Fraunces', serif; font-weight: 900; font-size: 1.15rem; color: var(--ink); letter-spacing: -0.02em; white-space: nowrap; }
  .brand-name em { font-style: normal; background: var(--sunset); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

  /* Menu toujours visible, scrollable horizontalement sur petit écran */
  .nav-menu {
    display: flex;
    align-items: center;
    gap: 0;
    list-style: none;
    margin: 0;
    padding: 0;
    overflow: visible;
    flex-shrink: 1;
    min-width: 0;
  }
  .nav-menu::-webkit-scrollbar { display: none; }

  /* Bouton hamburger : visible uniquement en mobile via media query */
  .nav-hamburger { display: none; }

  .nav-item { position: relative; flex-shrink: 0; }
  .nav-link, .nav-trigger {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-soft);
    background: none;
    border: none;
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    border-radius: var(--radius);
    transition: all 0.2s ease;
    white-space: nowrap;
  }
  .nav-link:hover, .nav-trigger:hover { color: var(--ink); background: rgba(255,255,255,0.05); }
  .nav-link.active, .nav-trigger.active { color: #fff; background: var(--orange-soft); border: 1px solid rgba(255, 77, 0, 0.3); }
  .caret { font-size: 0.6rem; transition: transform .2s; color: var(--ink-faint); }
  .nav-item.open .caret { transform: rotate(180deg); color: var(--orange); }
  
  .dropdown-panel {
    position: absolute;
    top: calc(100% + 8px);
    left: 0;
    background: rgba(22, 19, 21, 0.97);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    min-width: 220px;
    padding: 8px;
    display: none;
    z-index: 400;
  }
  .nav-item.open .dropdown-panel { display: block; animation: fadeIn 0.2s ease; }
  .dropdown-panel a { display: block; font-size: 0.88rem; color: var(--ink-soft); padding: 10px 14px; border-radius: 8px; }
  .dropdown-panel a:hover, .dropdown-panel a.active { background: var(--sunset); color: #fff; font-weight: 500; }

  /* Drawer mobile : caché par défaut, activé via media query + JS */
  .mobile-menu-overlay { display: none; }
  .mobile-menu { display: none; }

  /* ---------- PAGE ---------- */
  .page-wrap { max-width: 800px; margin: 0 auto; padding: 120px 24px 100px; }
  .breadcrumb { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--ink-faint); margin-bottom: 24px; display: flex; gap: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
  .breadcrumb b { color: var(--orange-deep); font-weight: 600; }

  #pageContent h1 { font-family: 'Fraunces', serif; font-weight: 800; font-size: clamp(2.2rem, 4vw, 3.2rem); letter-spacing: -0.02em; margin: 0 0 12px; background: linear-gradient(120deg, #fff 40%, var(--ink-soft)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  #pageContent .page-sub { color: var(--ink-soft); font-size: 1.1rem; margin: 0 0 40px; max-width: 62ch; line-height: 1.6; }
  
  #pageContent h2 { font-family: 'Fraunces', serif; font-weight: 700; font-size: 1.6rem; margin: 50px 0 20px; display: flex; align-items: center; gap: 12px; padding-top: 24px; border-top: 1px solid var(--line); color: #fff; }
  #pageContent h2:first-of-type { margin-top: 8px; padding-top: 0; border-top: none; }
  #pageContent h2 .emo { font-size: 1.3rem; filter: drop-shadow(0 0 4px rgba(255,255,255,0.2)); }
  
  #pageContent h3 { font-family: 'IBM Plex Mono', sans-serif; font-weight: 700; font-size: 0.85rem; margin: 32px 0 12px; color: var(--orange-deep); text-transform: uppercase; letter-spacing: 0.06em; }
  #pageContent p { margin: 0 0 16px; color: var(--ink-soft); font-size: 1rem; max-width: 68ch; }
  #pageContent ul { margin: 0 0 24px; padding-left: 24px; color: var(--ink-soft); font-size: 1rem; }
  #pageContent li { margin-bottom: 10px; }
  #pageContent li strong { color: #fff; font-weight: 600; }

  /* Callouts */
  .callout { display: grid; grid-template-columns: 28px 1fr; gap: 16px; padding: 18px 20px; border-radius: var(--radius); margin: 24px 0 32px; border: 1px solid transparent; background: rgba(255,255,255,0.02); backdrop-filter: blur(4px); }
  .callout strong { display: block; font-size: 0.85rem; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; font-family: 'IBM Plex Mono', monospace; }
  .callout p { margin: 0; font-size: 0.95rem; color: var(--ink-soft); }
  .callout .ic { font-size: 1.1rem; line-height: 1.2; }
  
  .callout.info { background: var(--orange-soft); border-color: rgba(255, 77, 0, 0.25); } .callout.info strong { color: var(--orange-deep); }
  .callout.warning { background: var(--amber-soft); border-color: rgba(255, 183, 0, 0.25); } .callout.warning strong { color: var(--amber); }
  .callout.danger { background: var(--plum-soft); border-color: rgba(157, 78, 221, 0.25); } .callout.danger strong { color: #b577e6; }

  /* Glossaire / Lexique */
  .glossary { display: grid; grid-template-columns: 1fr; gap: 16px; margin: 12px 0 32px; }
  @media (min-width:640px){ .glossary{ grid-template-columns: 1fr 1fr; } }
  .gterm { background: var(--bg-card); border: 1px solid var(--line); border-left: 4px solid var(--orange); padding: 16px; border-radius: var(--radius); transition: transform 0.2s, border-color 0.2s; }
  .gterm:hover { transform: translateY(-2px); border-color: rgba(255,77,0,0.3); }
  .gterm dt { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; font-weight: 700; color: var(--orange-deep); margin-bottom: 6px; text-transform: uppercase; }
  .gterm dd { margin: 0; font-size: 0.95rem; color: var(--ink-soft); line-height: 1.5; }

  /* Échelles / Niveaux de sanctions */
  .scale { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 16px 0 32px; border: none; }
  @media (max-width: 600px) { .scale { grid-template-columns: 1fr; } }
  .scale-step { padding: 20px 16px; background: var(--bg-card); border: 1px solid var(--line); border-radius: var(--radius); transition: all 0.2s; }
  .scale-step:hover { border-color: rgba(255,255,255,0.15); background: rgba(255,255,255,0.04); }
  .scale-step .bar { height: 4px; border-radius: 2px; margin-bottom: 14px; box-shadow: 0 2px 8px rgba(0,0,0,0.5); }
  .scale-step .s1 { background: #ffb703; box-shadow: 0 0 10px rgba(255,183,3,0.5); } 
  .scale-step .s2 { background: #ff7b00; box-shadow: 0 0 10px rgba(255,123,0,0.5); } 
  .scale-step .s3 { background: #e63946; box-shadow: 0 0 10px rgba(230,57,70,0.5); } 
  .scale-step .s4 { background: #9d4edd; box-shadow: 0 0 10px rgba(157,78,221,0.5); }
  .scale-step .label { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-faint); margin-bottom: 6px; }
  .scale-step h4 { font-family: 'Fraunces', serif; font-size: 1.05rem; margin: 0 0 6px; color: #fff; }
  .scale-step p { font-size: 0.85rem; color: var(--ink-soft); margin: 0; line-height: 1.4; }

  /* ---------- HOME / ACCUEIL (Bannière optimisée ici) ---------- */
  .home-hero { 
    display: flex; 
    flex-direction: column; 
    align-items: flex-start; 
    margin-bottom: 24px; 
    width: 100%;
  }
  .home-banner { 
    width: 100%; 
    max-height: 280px; /* Limite la hauteur pour éviter d'envahir l'écran */
    object-fit: cover; /* Recadre proprement l'image sans la déformer */
    border-radius: 16px; 
    margin: 12px 0 32px 0; /* Ajoute de l'espace autour de l'image */
    display: block; 
    box-shadow: 0 12px 40px rgba(0,0,0,0.5); /* Ombre prononcée */
    border: 1px solid rgba(255, 255, 255, 0.1); /* Bordure fine brillante */
    transition: transform 0.3s ease, border-color 0.3s ease; 
  }
  .home-banner:hover { 
    transform: scale(1.005); 
    border-color: rgba(255, 77, 0, 0.3); /* Légère lueur orange au survol */
  }
  .home-quote { font-family: 'Fraunces', serif; font-style: italic; font-weight: 600; font-size: 1.3rem; color: var(--orange-deep); margin: 0 0 24px; max-width: 48ch; line-height: 1.5; }
  .home-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin-top: 36px; }
  @media (max-width:560px){ .home-grid{ grid-template-columns: 1fr; } }
  .home-card { border: 1px solid var(--line); background: var(--bg-card); border-radius: var(--radius); padding: 24px; cursor: pointer; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
  .home-card:hover { border-color: var(--orange); background: var(--orange-soft); transform: translateY(-4px); box-shadow: 0 12px 30px rgba(255, 77, 0, 0.15); }
  .home-card .hc-num { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--orange-deep); margin-bottom: 8px; font-weight: 600; letter-spacing: 0.05em; }
  .home-card h3 { font-family: 'Fraunces', serif; font-size: 1.2rem; margin: 0 0 8px; text-transform: none; color: #fff; }
  .home-card p { font-size: 0.9rem; color: var(--ink-soft); margin: 0; line-height: 1.5; }

  /* ---------- FOOTER ---------- */
  footer { border-top: 1px solid var(--line); padding: 40px 32px 60px; max-width: 800px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 24px; }
  footer .f-brand { font-family: 'Fraunces', serif; font-weight: 800; font-size: 1.1rem; color: #fff; letter-spacing: -0.01em; }
  footer p { color: var(--ink-faint); font-size: 0.85rem; max-width: 46ch; margin: 8px 0 0; line-height: 1.5; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(4px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===== MOBILE RESPONSIVE ===== */
  @media (max-width: 860px) {

    /* Contenu de page */
    .page-wrap { padding: 90px 16px 80px; }
    #pageContent h1 { font-size: clamp(1.7rem, 7vw, 2.4rem); }
    #pageContent .page-sub { font-size: 0.97rem; }
    #pageContent h2 { font-size: 1.3rem; gap: 10px; }
    #pageContent p, #pageContent ul { font-size: 0.93rem; }

    /* Bannière d'accueil */
    .home-banner { max-height: 200px; border-radius: 12px; }
    .home-quote { font-size: 1.1rem; }
    .home-grid { grid-template-columns: 1fr; gap: 12px; }
    .home-card { padding: 18px 16px 14px; }
    .home-card h3 { font-size: 1.05rem; }

    /* Glossaire : 1 colonne */
    .glossary { grid-template-columns: 1fr; }

    /* Échelle sanctions : 2 colonnes puis 1 */
    .scale { grid-template-columns: 1fr 1fr; gap: 6px; }

    /* Callouts */
    .callout { padding: 14px 14px; gap: 12px; }

    /* Footer */
    footer { padding: 32px 16px 50px; flex-direction: column; gap: 12px; }
  }

  /* Très petits écrans */
  @media (max-width: 400px) {
    .topnav { padding: 0 12px; }
    .brand-name { font-size: 1rem; }
    .brand-sun { width: 36px; height: 36px; }
    .scale { grid-template-columns: 1fr; }
    .page-wrap { padding: 86px 12px 70px; }
    #pageContent h1 { font-size: 1.55rem; }
    .home-banner { max-height: 160px; }
  }
</style>
</head>

function sec(emo,title,body){ return '<h2><span class="emo">'+emo+'</span>'+title+'</h2>'+body; }
function sub(title,body){ return '<h3>'+title+'</h3>'+body; }
function ul(items){ return '<ul>'+items.map(i=>'<li>'+i+'</li>').join('')+'</ul>'; }
function p(text){ return '<p>'+text+'</p>'; }
function callout(type,icon,title,text){ return '<div class="callout '+type+'"><span class="ic">'+icon+'</span><div><strong>'+title+'</strong><p>'+text+'</p></div></div>'; }
function glossary(terms){ return '<dl class="glossary">'+terms.map(t=>'<div class="gterm"><dt>'+t[0]+'</dt><dd>'+t[1]+'</dd></div>').join('')+'</dl>'; }

/* ================= NAV BUILD ================= */
function findPageMeta(id){
  if(id === 'entreprise') return { label:'Entreprise', cat:null };
  for(const c of CATEGORIES){ if(c.pages.includes(id)) return { label:PAGES[id].title, cat:c }; }
  return null;
}

function buildTopNav(){
  const ul1 = document.getElementById('navMenu');
  ul1.innerHTML = '';
  const liHome = document.createElement('li');
  liHome.className = 'nav-item';
  liHome.innerHTML = '<a class="nav-link" data-page="accueil" href="#accueil">Accueil</a>';
  ul1.appendChild(liHome);

  CATEGORIES.forEach(cat => {
    const li = document.createElement('li');
    li.className = 'nav-item'; li.dataset.cat = cat.id;
    const btn = document.createElement('button');
    btn.className = 'nav-trigger'; btn.type = 'button';
    btn.innerHTML = '<span>'+cat.label+'</span><span class="caret">▾</span>';
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      const isOpen = li.classList.contains('open');
      document.querySelectorAll('.nav-item.open').forEach(n => n.classList.remove('open'));
      if(!isOpen) li.classList.add('open');
    });
    const panel = document.createElement('div');
    panel.className = 'dropdown-panel';
    cat.pages.forEach(pid => {
      const a = document.createElement('a');
      a.href = '#'+pid; a.dataset.page = pid; a.textContent = PAGES[pid].title;
      a.addEventListener('click', () => li.classList.remove('open'));
      panel.appendChild(a);
    });
    li.appendChild(btn); li.appendChild(panel);
    ul1.appendChild(li);
  });

  STANDALONE.forEach(s => {
    const li = document.createElement('li');
    li.className = 'nav-item';
    li.innerHTML = '<a class="nav-link" data-page="'+s.id+'" href="#'+s.id+'">'+s.label+'</a>';
    ul1.appendChild(li);
  });
}
document.addEventListener('click', () => document.querySelectorAll('.nav-item.open').forEach(n => n.classList.remove('open')));



buildTopNav();

/* No-op : plus de menu mobile drawer */
function closeMobileMenu(){}

/* ================= RENDER ================= */
function render(){
  let id = location.hash.replace('#','') || 'accueil';
  if(id !== 'accueil' && !PAGES[id]) id = 'accueil';

  const breadcrumb = document.getElementById('breadcrumb');
  const contentEl = document.getElementById('pageContent');

  if(id === 'accueil'){
    breadcrumb.innerHTML = '<b>Sunset FA</b><span>›</span><span>Accueil</span>';
    let cards = [...CATEGORIES.map((c,i) => ({num:'0'+(i+1), label:c.label, target:c.pages[0], desc: PAGES[c.pages[0]].title+' et '+(c.pages.length-1)+' autre(s) page(s)'})),
                 {num:'0'+(CATEGORIES.length+1), label:'Entreprise', target:'entreprise', desc:'Le cadre légal de l\'activité économique'}]
      .map(c => '<div class="home-card" data-nav="'+c.target+'"><p class="hc-num mono">'+c.num+'</p><h3>'+c.label+'</h3><p>'+c.desc+'</p></div>').join('');

    contentEl.innerHTML =
      '<div class="home-hero">'
      + '<img class="home-banner" src="data:image/jpeg;base64,'+BANNER_B64+'" alt="Bannière Sunset FA">'
      + '<h1>Bienvenue sur Sunset FA</h1>'
      + '<p class="home-quote">« Ici, le soleil se couche tous les soirs, mais les histoires, elles, ne s\'éteignent jamais. »</p>'
      + '<p class="page-sub">Ce règlement rassemble toutes les règles du serveur, classées par catégories. Utilise le menu en haut de page pour naviguer directement vers la section qui t\'intéresse.</p>'
      + callout('info','💡','Conseil du staff','Le respect entre joueurs est la base de tout. Sois courtois et bienveillant, en jeu comme en dehors, pour préserver une bonne ambiance.')
      + '</div>'
      + '<div class="home-grid">'+cards+'</div>';

    contentEl.querySelectorAll('[data-nav]').forEach(card => card.addEventListener('click', () => { location.hash = card.dataset.nav; }));
  } else {
    const page = PAGES[id];
    const meta = findPageMeta(id);
    breadcrumb.innerHTML = meta.cat
      ? '<b>Sunset FA</b><span>›</span><span>'+meta.cat.label+'</span><span>›</span><span>'+page.title+'</span>'
      : '<b>Sunset FA</b><span>›</span><span>'+page.title+'</span>';
    contentEl.innerHTML = '<h1>'+page.title+'</h1><p class="page-sub">'+page.sub+'</p>'+page.content;
  }

  document.querySelectorAll('[data-page]').forEach(a => a.classList.toggle('active', a.dataset.page === id));
  window.scrollTo({top:0, behavior:'auto'});
}
window.addEventListener('hashchange', render);
document.getElementById('brandBtn').addEventListener('click', () => location.hash = 'accueil');
render();
</script>
